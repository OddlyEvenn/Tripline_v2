# ─────────────────────────────────────────────────────────────────
# NGINX — Production Reverse Proxy & Load Balancer for TripLine
# ─────────────────────────────────────────────────────────────────

user nginx;
worker_processes auto;                    # Match CPU count automatically
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;              # Max simultaneous connections per worker
    use epoll;                            # Efficient I/O on Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate Limiting Zones ─────────────────────────────────────
    # General: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # API: stricter — 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # ── Upstream Pools (load balanced round-robin) ───────────────
    # Docker Compose: single backend container (scale with --scale backend=N)
    upstream backend_pool {
        least_conn;                        # Route to least busy backend
        server backend:8080;
        keepalive 32;                      # Keep persistent connections to backends
    }

    upstream frontend_pool {
        server frontend:80;
        keepalive 16;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────────
    server {
        listen 80;
        server_name tripline.com www.tripline.com;

        # Health check for load balancers (no redirect)
        location /nginx-health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name tripline.com www.tripline.com;

        # ── SSL / TLS ──────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ───────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https://api.stripe.com;" always;

        # ── API Routes → Backend ───────────────────────────────
        location /api/ {
            # Rate limit API — burst of 20 requests, then enforce rate
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_pool;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";    # For keepalive upstream

            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ── Stripe Webhook (needs raw body, no rate limit reduction) ──
        location /api/payment/webhook {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health Check (backend) ─────────────────────────────
        location /health {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Static Assets — serve from frontend and cache ──────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            proxy_pass http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
        }

        # ── Frontend SPA (everything else) ─────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;

            proxy_pass http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        # ── Error Pages ────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
