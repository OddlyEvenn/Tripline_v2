# ─────────────────────────────────────────────────────────────────────────
# NGINX Ingress — TripLine Production
#
# Prerequisites:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
# ─────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tripline-ingress
  namespace: tripline
  annotations:
    # NGINX Ingress class
    kubernetes.io/ingress.class: "nginx"

    # SSL — auto-redirect HTTP to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"

    # Body size limit (for file uploads etc.)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # CORS (handled by backend, but annotate here too)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://tripline.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # cert-manager TLS (if you use cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - tripline.com
        - www.tripline.com
      secretName: tripline-tls    # cert-manager will populate this
  rules:
    # ── tripline.com → frontend ───────────────────────────────────────────
    - host: tripline.com
      http:
        paths:
          # API routes → backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          # Everything else → frontend service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

    # www redirect (handled by the rule below)
    - host: www.tripline.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
