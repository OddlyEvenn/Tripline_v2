# ─────────────────────────────────────────────────────────────────────────
# GitHub Actions — TripLine CI + CD Pipeline
#
# CI  (all pushes + PRs to main):
#   1. Build backend Docker image   — validates Dockerfile, no push
#   2. Build frontend Docker image  — validates Dockerfile, no push
#
# CD  (push to main only):
#   3. SSH into EC2 → git pull → write .env → docker compose up --build -d
#
# Required GitHub Secrets:
#   EC2_HOST      — public IP or domain of your EC2 instance
#   EC2_USER      — SSH user (e.g. ubuntu, ec2-user)
#   EC2_SSH_KEY   — full contents of your .pem private key
#   ENV_FILE      — full contents of your production .env file
#
# EC2 Prerequisites (one-time setup):
#   sudo apt update && sudo apt install -y docker.io docker-compose-v2 git
#   sudo usermod -aG docker $USER  →  then re-login
#   git clone <repo-url> ~/tripline   (or whichever path you use)
# ─────────────────────────────────────────────────────────────────────────

name: TripLine CI/CD

on:
  push:
    branches:
      - "**"        # CI runs on every branch push
  pull_request:
    branches:
      - main

# Cancel any in-progress run on the same branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # JOB 1 — CI: Build Backend (no push, validates Dockerfile)
  # ────────────────────────────────────────────────────────────────────────
  build-backend:
    name: "CI — Build Backend"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: tripline-backend:ci
          # Layer cache keyed per branch — speeds up repeated builds
          cache-from: type=gha,scope=backend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}

  # ────────────────────────────────────────────────────────────────────────
  # JOB 2 — CI: Build Frontend (no push, validates Dockerfile)
  # ────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: "CI — Build Frontend"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: tripline-frontend:ci
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}

  # ────────────────────────────────────────────────────────────────────────
  # JOB 3 — CD: Deploy to AWS EC2 (main branch push only)
  # ────────────────────────────────────────────────────────────────────────
  deploy:
    name: "CD — Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Only deploy on a direct push to main (not PRs, not other branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Write SSH private key ────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Trust the EC2 host — prevents interactive prompt on first connect
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ── Deploy via SSH ───────────────────────────────────────────────
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          # ── Step 1: Write the production .env to EC2 ──────────────────
          # Uses printf to preserve newlines; avoids echo issues with special chars
          printf '%s' "$ENV_FILE" | ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "$EC2_USER@$EC2_HOST" \
            "cat > ~/tripline/.env"

          # ── Step 2: Pull latest code + rebuild + restart ───────────────
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "$EC2_USER@$EC2_HOST" << 'ENDSSH'

            set -e  # Abort on any error

            cd ~/tripline

            echo "==> Pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            echo "==> Building and starting containers..."
            docker compose -f docker-compose.ec2.yml up --build -d --remove-orphans

            echo "==> Waiting for containers to be healthy (up to 90s)..."
            for i in $(seq 1 18); do
              UNHEALTHY=$(docker compose -f docker-compose.ec2.yml ps --format json \
                | python3 -c "
          import sys, json
          data = sys.stdin.read().strip()
          # Handle both JSONL (one object per line) and JSON array
          if data.startswith('['):
              items = json.loads(data)
          else:
              items = [json.loads(l) for l in data.splitlines() if l.strip()]
          bad = [c.get('Name','?') for c in items if c.get('Health','') not in ('healthy','')]
          print(len(bad))
          " 2>/dev/null || echo "0")

              if [ "$UNHEALTHY" = "0" ]; then
                echo "==> All containers are healthy."
                break
              fi

              echo "    Still waiting... (attempt $i/18)"
              sleep 5
            done

            echo "==> Container status:"
            docker compose -f docker-compose.ec2.yml ps

            echo "==> Verifying backend health through NGINX..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "==> Health check passed (HTTP $HTTP_CODE)"
            else
              echo "ERROR: Health check returned HTTP $HTTP_CODE"
              docker compose -f docker-compose.ec2.yml logs --tail=50
              exit 1
            fi

            echo "==> Pruning unused Docker images to save disk space..."
            docker image prune -f

            echo "==> Deployment complete!"
          ENDSSH

      # ── Print summary ─────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: EC2 @ \`${{ secrets.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Deployment failed — print logs hint
        if: failure()
        run: |
          echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SSH into EC2 and run:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cd ~/tripline && docker compose -f docker-compose.ec2.yml logs --tail=100" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
